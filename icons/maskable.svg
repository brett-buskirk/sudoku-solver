<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Sudoku">
  <!-- Full-bleed opaque background so platform masks (circle/squircle) never clip it. -->
  <rect width="32" height="32" fill="#1f2430"/>
  <!-- 3x3 grid kept within the maskable safe zone (inner 80%). -->
  <g>
    <rect x="6"  y="6"  width="5.3" height="5.3" rx="1" fill="#f4f7fb"/>
    <rect x="13.35" y="6"  width="5.3" height="5.3" rx="1" fill="#36c08b"/>
    <rect x="20.7" y="6"  width="5.3" height="5.3" rx="1" fill="#f4f7fb"/>
    <rect x="6"  y="13.35" width="5.3" height="5.3" rx="1" fill="#2f7dd1"/>
    <rect x="13.35" y="13.35" width="5.3" height="5.3" rx="1" fill="#f4f7fb"/>
    <rect x="20.7" y="13.35" width="5.3" height="5.3" rx="1" fill="#2f7dd1"/>
    <rect x="6"  y="20.7" width="5.3" height="5.3" rx="1" fill="#f4f7fb"/>
    <rect x="13.35" y="20.7" width="5.3" height="5.3" rx="1" fill="#36c08b"/>
    <rect x="20.7" y="20.7" width="5.3" height="5.3" rx="1" fill="#f4f7fb"/>
  </g>
</svg>
