<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sudoku Solver</title>
  <meta name="description" content="Solve Sudoku puzzles, or play one of 100 built-in puzzles. Works offline.">
  <meta name="theme-color" content="#1f2430">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sudoku">
  <link rel="stylesheet" href="css/sudoku.css">
</head>

<body>
  <main class="app">
    <h1>Sudoku Solver</h1>
    <p class="subtitle">Choose a puzzle or type your own, then solve it.</p>

    <!-- The 9x9 grid of inputs is built by main.js -->
    <div id="board" class="board" aria-label="Sudoku board"></div>

    <div id="status" class="status" role="status" aria-live="polite"></div>

    <div class="controls">
      <label class="field">
        <span>Puzzle</span>
        <select id="select"></select>
      </label>
      <div class="buttons">
        <button type="button" id="solve">Solve</button>
        <button type="button" id="clear" class="secondary">Clear</button>
      </div>
    </div>
  </main>

  <script src="javascript/puzzles.js"></script>
  <script src="javascript/sudoku.js"></script>
  <script src="javascript/main.js"></script>
</body>
</html>
